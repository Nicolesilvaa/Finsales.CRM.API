spring:
  application:
    name: Finsales.CRM.API
    spring:
      datasource:
        url: jdbc:h2:mem:finsalesdb
        driver-class-name: org.h2.Driver
        username: sa
        password: ""

      jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
          ddl-auto: update
        show-sql: true

      h2:
        console:
          enabled: true
          path: /h2-console


server:
  port: 8081

jwt:
  secret: minha-chave-super-secreta-jwt-2026-finsales
  expiration: 3600000
